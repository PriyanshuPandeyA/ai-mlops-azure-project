name: CI Pipeline (Docker Build & Push)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    - name: Build Docker Image
      run: docker build -t priyanshu2223/feedback-ui:v1 .

    - name: Push Docker Image
      run: docker push priyanshu2223/feedback-ui:v1